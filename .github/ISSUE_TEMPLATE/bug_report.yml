name: Bug report
description: Report scheduling, CLI, daemon, or diagnostic behavior issues.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. `gpu-holder` must not kill or control external GPU processes.
        If you think this safety boundary was violated, include the evidence.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands
      description: Paste the full commands. Redact only secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic output
      description: Paste `gpu-holder doctor --json` output.
      render: json
  - type: textarea
    id: status
    attributes:
      label: Status and logs
      description: Paste relevant `gpu-holder status --json` output and `~/.gpu-holder/gpu-holder.log` snippets.
      render: json
  - type: dropdown
    id: real_gpu
    attributes:
      label: Did you run a real CUDA holder worker?
      options:
        - "No"
        - "Yes, on idle GPUs or GPUs I explicitly own"
        - "Yes, on shared or busy GPUs"
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not ask `gpu-holder` to kill or control external GPU processes.
          required: true
