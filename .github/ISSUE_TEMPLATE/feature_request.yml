name: Feature request
description: Propose policy, worker, CLI, diagnostics, packaging, or documentation improvements.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or operations problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, CLI entry point, and expected defaults.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Policy / scheduler
        - Worker program / hold mode
        - CLI status snapshot
        - CLI / daemon
        - Diagnostics / reporting
        - Packaging / release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: |
        How will this preserve the invariant that external GPU processes are read-only scheduling
        signals and must not become control targets?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What simpler workarounds or rejected designs did you consider?
