name: 功能请求
description: 提议 policy、worker、CLI、诊断、打包或文档改进。
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 这个功能要解决什么工作流或运维问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案
      description: 描述行为、CLI 入口和预期默认值。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 范围
      options:
        - Policy / 调度器
        - Worker program / hold mode
        - CLI 状态 snapshot
        - CLI / daemon
        - 诊断 / 报告
        - 打包 / 发布
        - 文档
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: 安全考虑
      description: |
        这个变更如何保持“外部 GPU 进程只是只读调度信号，不能变成控制目标”的不变量？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些更简单的替代办法或已拒绝的设计？
