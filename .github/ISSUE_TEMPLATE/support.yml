name: Runtime support
description: Ask for help interpreting status, doctor, logs, or policy decisions.
title: "[support]: "
labels: ["support"]
body:
  - type: markdown
    attributes:
      value: |
        Prefer read-only commands for support requests:

        ```bash
        gpu-holder doctor --json
        gpu-holder status --json
        tail -n 80 ~/.gpu-holder/gpu-holder.log
        ```
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or fix?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, GPU model, driver/CUDA version, and install method.
  - type: textarea
    id: outputs
    attributes:
      label: Read-only outputs
      description: Paste relevant doctor/status output and log snippets.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I understand `gpu-holder` should only stop its own workers, not external GPU jobs.
          required: true
