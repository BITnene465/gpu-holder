name: Runtime support
description: 请求帮助解释 status、doctor、日志输出或策略决策。
title: "[support]: "
labels: ["support"]
body:
  - type: markdown
    attributes:
      value: |
        支持请求优先使用只读命令：

        ```bash
        gpu-holder doctor --json
        gpu-holder status --json
        tail -n 80 ~/.gpu-holder/gpu-holder.log
        ```
  - type: textarea
    id: question
    attributes:
      label: 问题
      description: 你想理解或修复什么？
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: Python 版本、GPU 型号、driver/CUDA 版本、安装方式。
  - type: textarea
    id: outputs
    attributes:
      label: 只读输出
      description: 粘贴相关 doctor/status 输出和日志片段。
  - type: checkboxes
    id: safety
    attributes:
      label: 安全
      options:
        - label: 我理解 `gpu-holder` 只应该停止自己启动的 worker，而不是外部 GPU 任务。
          required: true
