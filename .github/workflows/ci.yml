name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check --no-cache src tests
      - name: Test
        run: pytest -q
      - name: Compile
        run: PYTHONPYCACHEPREFIX=/tmp/gpu-holder-pycache python -m compileall -q src tests
      - name: Build package
        run: python -m build
